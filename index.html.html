<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>调配属于你的情感配方 | 可比克简薯片</title>
<style>
:root {
--page-bg: #fdf6f0;
--card-bg: #ffffff;
--text-dark: #3d2b1f;
--text-light: #6b5a4e;
--accent: #e8833a;
--accent-2: #f5a65b;
--btn-primary: #e8833a;
--btn-hover: #c9702e;
--border-soft: #ede4d8;
--shadow-soft: 0 4px 20px rgba(0, 0, 0, 0.06);
--shadow-card: 0 8px 32px rgba(0, 0, 0, 0.08);
--radius-lg: 20px;
--radius-md: 14px;
--radius-sm: 10px;
--font-title: 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', 'Noto Sans SC', sans-serif;
--font-body: 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', 'Noto Sans SC', sans-serif;
--transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
}

* {
margin: 0;
padding: 0;
box-sizing: border-box;
}

body {
font-family: var(--font-body);
background: linear-gradient(180deg, #fef9f3 0%, #fdf3e7 30%, #fef7f0 60%, #fdf6f0 100%);
min-height: 100vh;
min-height: 100dvh;
display: flex;
justify-content: center;
align-items: flex-start;
padding: 0;
-webkit-tap-highlight-color: transparent;
-webkit-font-smoothing: antialiased;
-moz-osx-font-smoothing: grayscale;
background-attachment: fixed;
}

.app-container {
width: 100%;
max-width: 450px;
min-height: 100vh;
min-height: 100dvh;
position: relative;
overflow-x: hidden;
display: flex;
flex-direction: column;
}

/* 顶部品牌条 */
.brand-bar {
display: flex;
align-items: center;
justify-content: center;
padding: 14px 20px 8px;
gap: 8px;
flex-shrink: 0;
}

.brand-logo-icon {
width: 36px;
height: 36px;
background: var(--accent);
border-radius: 50%;
display: flex;
align-items: center;
justify-content: center;
color: #fff;
font-weight: 700;
font-size: 14px;
letter-spacing: -1px;
flex-shrink: 0;
}

.brand-text {
font-family: var(--font-title);
font-weight: 700;
font-size: 15px;
color: #5c3d2e;
letter-spacing: 0.5px;
}

.brand-text span {
color: var(--accent);
}

/* 页面容器 */
.page {
display: none;
flex-direction: column;
flex: 1;
padding: 0 18px 24px;
animation: fadeSlideIn 0.4s ease forwards;
}

.page.active {
display: flex;
}

@keyframes fadeSlideIn {
from {
opacity: 0;
transform: translateY(18px);
}
to {
opacity: 1;
transform: translateY(0);
}
}

@keyframes pulse {
0%,
100% {
transform: scale(1);
}
50% {
transform: scale(1.04);
}
}

@keyframes floatUp {
0% {
opacity: 0;
transform: translateY(30px);
}
100% {
opacity: 1;
transform: translateY(0);
}
}

@keyframes shimmer {
0% {
background-position: -200% center;
}
100% {
background-position: 200% center;
}
}

@keyframes popIn {
0% {
transform: scale(0.3);
opacity: 0;
}
70% {
transform: scale(1.08);
opacity: 1;
}
100% {
transform: scale(1);
opacity: 1;
}
}

@keyframes confettiDrop {
0% {
transform: translateY(-60px) rotate(0deg);
opacity: 1;
}
100% {
transform: translateY(105vh) rotate(720deg);
opacity: 0;
}
}

/* 开始页 */
.start-page {
align-items: center;
justify-content: center;
text-align: center;
gap: 18px;
}

.start-illustration {
width: 160px;
height: 160px;
border-radius: 50%;
background: radial-gradient(circle at 40% 35%, #fff8f0 0%, #fde4cc 40%, #f5c89b 100%);
display: flex;
align-items: center;
justify-content: center;
font-size: 80px;
animation: pulse 3s ease-in-out infinite;
box-shadow: 0 12px 40px rgba(232, 131, 58, 0.2);
position: relative;
}

.start-illustration::after {
content: '';
position: absolute;
inset: -8px;
border-radius: 50%;
border: 2px dashed rgba(232, 131, 58, 0.3);
animation: pulse 3s ease-in-out infinite 0.5s;
}

.start-title {
font-family: var(--font-title);
font-size: 26px;
font-weight: 800;
color: #4a2c1a;
letter-spacing: 1px;
line-height: 1.3;
}

.start-title .highlight {
color: var(--accent);
position: relative;
}

.start-subtitle {
font-size: 14px;
color: #8b6f5e;
line-height: 1.6;
max-width: 280px;
}

.btn-start {
display: inline-block;
padding: 15px 48px;
background: linear-gradient(135deg, #e8833a 0%, #f5a65b 100%);
color: #fff;
font-size: 17px;
font-weight: 700;
border: none;
border-radius: 50px;
cursor: pointer;
letter-spacing: 1.5px;
box-shadow: 0 8px 24px rgba(232, 131, 58, 0.35);
transition: var(--transition);
position: relative;
overflow: hidden;
font-family: var(--font-title);
}

.btn-start:active {
transform: scale(0.95);
box-shadow: 0 4px 12px rgba(232, 131, 58, 0.3);
}

.btn-start::after {
content: '';
position: absolute;
inset: 0;
background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
animation: shimmer 2s infinite;
}

/* 测试页 */
.test-page {
gap: 8px;
}

.progress-wrap {
display: flex;
align-items: center;
gap: 10px;
padding: 4px 0 8px;
flex-shrink: 0;
}

.progress-bar-outer {
flex: 1;
height: 8px;
background: #ede4d8;
border-radius: 10px;
overflow: hidden;
}

.progress-bar-inner {
height: 100%;
background: linear-gradient(90deg, #e8833a, #f5a65b);
border-radius: 10px;
transition: width 0.4s ease;
}

.progress-text {
font-size: 13px;
color: #8b6f5e;
font-weight: 600;
white-space: nowrap;
min-width: 40px;
text-align: right;
}

.question-card {
background: var(--card-bg);
border-radius: var(--radius-lg);
padding: 22px 18px 20px;
box-shadow: var(--shadow-card);
flex-shrink: 0;
transition: var(--transition);
border: 1px solid var(--border-soft);
}

.question-label {
display: inline-block;
background: #fef0e4;
color: #c9702e;
font-size: 12px;
font-weight: 700;
padding: 4px 12px;
border-radius: 20px;
margin-bottom: 10px;
letter-spacing: 0.5px;
}

.question-label.q9-label {
background: #fff0e8;
color: #d4783c;
}

.question-title {
font-family: var(--font-title);
font-size: 17px;
font-weight: 700;
color: #3d2b1f;
line-height: 1.5;
margin-bottom: 16px;
}

.options-list {
display: flex;
flex-direction: column;
gap: 9px;
}

.option-btn {
display: flex;
align-items: center;
gap: 10px;
padding: 14px 15px;
border-radius: var(--radius-sm);
border: 2px solid #ede4d8;
background: #fefcf9;
cursor: pointer;
transition: var(--transition);
font-size: 14.5px;
color: #4a3528;
text-align: left;
font-family: var(--font-body);
line-height: 1.4;
-webkit-tap-highlight-color: transparent;
user-select: none;
position: relative;
}

.option-btn:active {
transform: scale(0.98);
}

.option-btn.selected {
border-color: #e8833a;
background: #fef7f0;
box-shadow: 0 0 0 4px rgba(232, 131, 58, 0.08);
font-weight: 600;
}

.option-letter {
width: 32px;
height: 32px;
border-radius: 50%;
background: #f5f0ea;
display: flex;
align-items: center;
justify-content: center;
font-weight: 700;
font-size: 14px;
color: #8b6f5e;
flex-shrink: 0;
transition: var(--transition);
}

.option-btn.selected .option-letter {
background: #e8833a;
color: #fff;
}

.option-text {
flex: 1;
}

/* 多选标记 */
.option-btn.multi-selected {
border-color: #e8833a;
background: #fef7f0;
box-shadow: 0 0 0 4px rgba(232, 131, 58, 0.08);
font-weight: 600;
}

.option-btn.multi-selected .option-letter {
background: #e8833a;
color: #fff;
}

.multi-hint {
font-size: 12px;
color: #c9702e;
text-align: center;
margin-top: 6px;
font-weight: 500;
}

.btn-next-wrap {
display: flex;
gap: 10px;
flex-shrink: 0;
margin-top: 4px;
}

.btn-nav {
flex: 1;
padding: 14px;
border-radius: 50px;
font-size: 16px;
font-weight: 700;
cursor: pointer;
border: none;
letter-spacing: 0.5px;
transition: var(--transition);
font-family: var(--font-title);
text-align: center;
}

.btn-prev {
background: #f5f0ea;
color: #6b5a4e;
flex: 0.4;
}

.btn-next {
background: linear-gradient(135deg, #e8833a, #f5a65b);
color: #fff;
flex: 0.6;
box-shadow: 0 4px 16px rgba(232, 131, 58, 0.3);
}

.btn-next:disabled {
opacity: 0.4;
pointer-events: none;
box-shadow: none;
}

.btn-nav:active {
transform: scale(0.95);
}

/* 结果页 */
.result-page {
align-items: center;
gap: 14px;
padding-bottom: 40px;
animation: floatUp 0.6s ease forwards;
}

.result-header {
text-align: center;
width: 100%;
}

.result-badge {
display: inline-block;
background: #fef0e4;
color: #c9702e;
font-size: 13px;
font-weight: 700;
padding: 5px 14px;
border-radius: 20px;
letter-spacing: 0.5px;
margin-bottom: 6px;
}

.result-animal-circle {
width: 130px;
height: 130px;
border-radius: 50%;
margin: 8px auto;
display: flex;
align-items: center;
justify-content: center;
font-size: 75px;
animation: popIn 0.6s ease forwards;
position: relative;
box-shadow: 0 16px 48px rgba(0, 0, 0, 0.12);
}

.result-animal-circle::after {
content: '';
position: absolute;
inset: -6px;
border-radius: 50%;
border: 3px dashed rgba(255, 255, 255, 0.5);
animation: pulse 2.5s ease-in-out infinite;
}

.result-label-name {
font-family: var(--font-title);
font-size: 24px;
font-weight: 800;
color: #3d2b1f;
letter-spacing: 1px;
margin: 4px 0;
}

.result-flavor {
font-size: 14px;
color: #8b6f5e;
font-weight: 500;
letter-spacing: 0.5px;
}

.result-desc-card {
background: #fff;
border-radius: var(--radius-lg);
padding: 18px 16px;
width: 100%;
text-align: center;
box-shadow: var(--shadow-soft);
border: 1px solid var(--border-soft);
line-height: 1.6;
font-size: 14px;
color: #5c3d2e;
}

.result-desc-card strong {
color: #3d2b1f;
}

/* 身份编码区 */
.id-card {
background: #fff;
border-radius: var(--radius-lg);
padding: 18px 16px;
width: 100%;
text-align: center;
box-shadow: var(--shadow-soft);
border: 2px solid #ede4d8;
position: relative;
overflow: hidden;
}

.id-card::before {
content: '';
position: absolute;
top: -30px;
right: -30px;
width: 80px;
height: 80px;
background: rgba(232, 131, 58, 0.06);
border-radius: 50%;
}

.id-label {
font-size: 13px;
color: #8b6f5e;
font-weight: 600;
letter-spacing: 1px;
margin-bottom: 4px;
}

.id-code {
font-family: 'Courier New', 'SF Mono', 'Menlo', monospace;
font-size: 18px;
font-weight: 800;
color: #3d2b1f;
letter-spacing: 2px;
word-break: break-all;
}

.id-note {
font-size: 11px;
color: #a89080;
margin-top: 8px;
}

.btn-row {
display: flex;
gap: 10px;
width: 100%;
flex-wrap: wrap;
justify-content: center;
}

.btn-retry {
padding: 12px 28px;
background: #fff;
border: 2px solid #ede4d8;
border-radius: 50px;
font-size: 15px;
font-weight: 600;
cursor: pointer;
color: #5c3d2e;
transition: var(--transition);
font-family: var(--font-title);
letter-spacing: 0.5px;
}

.btn-retry:active {
background: #fef7f0;
border-color: #e8833a;
}

/* 纸屑 */
.confetti-container {
position: fixed;
top: 0;
left: 0;
width: 100%;
height: 100%;
pointer-events: none;
z-index: 999;
overflow: hidden;
}

.confetti-piece {
position: absolute;
width: 10px;
height: 10px;
border-radius: 3px;
animation: confettiDrop 3s linear forwards;
}

/* 响应式微调 */
@media (max-width: 360px) {
.question-title {
font-size: 15px;
}
.option-btn {
font-size: 13px;
padding: 12px 10px;
}
.start-title {
font-size: 22px;
}
}

@media (min-width: 420px) {
.app-container {
border-left: 1px solid #ede4d8;
border-right: 1px solid #ede4d8;
}
}

/* Toast */
.toast {
position: fixed;
top: 20px;
left: 50%;
transform: translateX(-50%);
background: #3d2b1f;
color: #fff;
padding: 10px 20px;
border-radius: 30px;
font-size: 13px;
font-weight: 600;
z-index: 1000;
opacity: 0;
pointer-events: none;
transition: opacity 0.3s ease;
letter-spacing: 0.5px;
}

.toast.show {
opacity: 1;
}
</style>
</head>
<body>
<div class="app-container" id="appContainer">

<div class="confetti-container" id="confettiContainer"></div>

<div class="page active start-page" id="pageStart">

<div class="btn-row">

</div>
</div>
</div>

// ==================== 全局状态 ====================
let currentBase = null;
let currentQuestionIndex = 0;
let totalQuestionsInFlow = 9;
let answers = {};
let selectedMulti = {};

// DOM引用
const pageStart = document.getElementById('pageStart');
const pageTest = document.getElementById('pageTest');

const questionLabel = document.getElementById('questionLabel');
const questionTitle = document.getElementById('questionTitle');
const optionsList = document.getElementById('optionsList');
const multiHint = document.getElementById('multiHint');
const btnPrev = document.getElementById('btnPrev');
const btnNext = document.getElementById('btnNext');
const toast = document.getElementById('toast');
const confettiContainer = document.getElementById('confettiContainer');

function showPage(page) {
[pageStart, pageTest, pageResult].forEach(p => p.classList.remove('active'));
page.classList.add('active');
window.scrollTo({ top: 0, behavior: 'smooth' });
}

function showToast(msg) {
toast.textContent = msg;
toast.classList.add('show');
clearTimeout(toast._timeout);
toast._timeout = setTimeout(() => { toast.classList.remove('show'); }, 1800);
}

function updateProgress(current, total) {
const pct = Math.round((current / total) * 100);
progressBar.style.width = pct + '%';
progressText.textContent = current + '/' + total;
}

// ==================== 开始测试 ====================

renderQuestion1();
updateProgress(1, 9);
btnPrev.style.display = 'none';
btnNext.disabled = true;

};

// ==================== 渲染第1题 ====================
function renderQuestion1() {
questionLabel.textContent = '第1题 · 关系基底';
questionTitle.textContent = question1.title;
multiHint.style.display = 'none';
optionsList.innerHTML = '';
question1.options.forEach(opt => {
const btn = document.createElement('button');
btn.className = 'option-btn';
btn.innerHTML = `<span class="option-letter">${opt.letter}</span><span class="option-text">${opt.text}</span>`;
btn.addEventListener('click', () => {
optionsList.querySelectorAll('.option-btn').forEach(b => b.classList.remove('selected'));
btn.classList.add('selected');
answers[1] = opt.letter;
btnNext.disabled = false;
});
if (answers[1] === opt.letter) btn.classList.add('selected');
optionsList.appendChild(btn);
});
if (answers[1]) btnNext.disabled = false;
else btnNext.disabled = true;
btnPrev.style.display = 'none';
}

// ==================== 计算结果 ====================
function calculateAndShowResult() {
const baseKey = currentBase;
const typeCounts = { 1: 0, 2: 0, 3: 0, 4: 0 };
for (let qId = 2; qId <= 8; qId++) {
const letter = answers[qId];
if (letter) {
const typeMap = { 'A': 1, 'B': 2, 'C': 3, 'D': 4 };
const t = typeMap[letter] || 4;
typeCounts[t]++;
}
}
let maxCount = -1;
let dominantTypes = [];
for (let t = 1; t <= 4; t++) {
if (typeCounts[t] > maxCount) {
maxCount = typeCounts[t];
dominantTypes = [t];
} else if (typeCounts[t] === maxCount) {
dominantTypes.push(t);
}
}
let finalType = dominantTypes[0];
if (dominantTypes.length > 1 && answers[9]) {
const sels = answers[9];
const group1 = ['A', 'G', 'J'];
const group2 = ['B', 'C', 'D', 'I'];
const group3 = ['H'];
const group4 = ['F', 'K', 'L'];
let scoreBias = { 1: 0, 2: 0, 3: 0, 4: 0 };
sels.forEach(s => {
if (group1.includes(s)) scoreBias[1]++;
if (group2.includes(s)) scoreBias[2]++;
if (group3.includes(s)) scoreBias[3]++;
if (group4.includes(s)) scoreBias[4]++;
if (s === 'E') scoreBias[1]++;
});
let bestBias = -1;
for (const t of dominantTypes) {
if (scoreBias[t] > bestBias) {
bestBias = scoreBias[t];
finalType = t;
}
}
}
const tagData = resultTags[baseKey].tags[finalType];
const seriesName = resultTags[baseKey].series;
userIdentityCode = generateIdentityCode(baseKey, finalType);
showResultPage(baseKey, finalType, tagData, seriesName);
}

function generateIdentityCode(baseKey, finalType) {
const now = new Date();
const y = now.getFullYear();
const m = String(now.getMonth() + 1).padStart(2, '0');
const d = String(now.getDate()).padStart(2, '0');
const h = String(now.getHours()).padStart(2, '0');
const min = String(now.getMinutes()).padStart(2, '0');
const s = String(now.getSeconds()).padStart(2, '0');
const ms = String(now.getMilliseconds()).padStart(3, '0');
const randChars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
let rand = '';
for (let i = 0; i < 4; i++) {
rand += randChars.charAt(Math.floor(Math.random() * randChars.length));
}
const baseMap = { 'A': 'LV', 'B': 'BR', 'C': 'BS', 'D': 'FR', 'E': 'FM', 'F': 'TS' };
const prefix = baseMap[baseKey] || 'XX';
return 'JA' + prefix + y + m + d + h + min + s + ms + rand;
}

// ==================== 纸屑动画 ====================
function spawnConfetti(accentColor) {
confettiContainer.innerHTML = '';
const colors = [accentColor, '#f5a65b', '#ffcc80', '#ffe0b2', '#ffd54f', '#ffab40', '#fff176', '#ff8a65'];
for (let i = 0; i < 60; i++) {
const piece = document.createElement('div');
piece.className = 'confetti-piece';
piece.style.left = Math.random() * 100 + '%';
piece.style.top = -(Math.random() * 40 + 10) + 'px';
piece.style.width = (Math.random() * 10 + 6) + 'px';
piece.style.height = (Math.random() * 10 + 6) + 'px';
piece.style.background = colors[Math.floor(Math.random() * colors.length)];
piece.style.animationDuration = (Math.random() * 2.5 + 2) + 's';
piece.style.animationDelay = Math.random() * 1.5 + 's';
piece.style.borderRadius = Math.random() > 0.5 ? '50%' : '3px';
confettiContainer.appendChild(piece);
}
setTimeout(() => { confettiContainer.innerHTML = ''; }, 4500);
}
